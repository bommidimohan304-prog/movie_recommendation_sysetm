<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | CinemaStream</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 1. Global Reset & Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            /* NEW: Deeper, more cinematic midnight-obsidian background */
            background: radial-gradient(circle at top right, #0d1117 0%, #050505 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
        }

        @keyframes slideIn {
            0% { transform: translateX(-100%); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wrapper {
            display: flex;
            height: 100vh;
        }

        /* 2. Logout Button */
        .logout-btn {
            position: fixed;
            top: 20px;
            right: 30px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ff4d4d;
            border-radius: 10px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: 600;
            transition: 0.3s;
            z-index: 100;
        }

        .logout-btn:hover {
            background: rgba(255, 77, 77, 0.1);
            border-color: #ff4d4d;
            transform: translateY(-2px);
        }

        /* 3. Left Panel */
        .left {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            animation: slideIn 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            z-index: 10;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .select-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .select-display {
            padding: 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        .dropdown {
            display: none;
            background: #0d1117;
            margin-top: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 150px;
            overflow-y: auto;
        }

        .option { padding: 12px; cursor: pointer; transition: 0.2s; }
        .option:hover { background: #0072ff; }

        .chip {
            display: inline-flex;
            align-items: center;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            padding: 6px 12px;
            margin: 4px;
            border-radius: 20px;
            font-size: 12px;
        }

        /* 4. Rating Dial System */
        .dial-container { margin-top: auto; text-align: center; }
        .dial-wrapper {
            position: relative;
            display: inline-block;
            user-select: none;
        }
        svg { transform: rotate(-90deg); cursor: pointer; touch-action: none; }
        .bg { stroke: rgba(255,255,255,0.03); stroke-width: 8; fill: none; }
        .progress { 
            stroke: #00c6ff; 
            stroke-width: 8; 
            stroke-linecap: round; 
            fill: none; 
            transition: stroke-dashoffset 0.1s ease;
        }
        
        .find-btn {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .find-btn:active { transform: scale(0.98); }

        /* 5. Right Panel */
        .right {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            height: 300px;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            transition: 0.3s;
            animation: fadeIn 0.5s ease backwards;
        }

        .card:hover { transform: translateY(-5px); border-color: #00c6ff; background: rgba(0, 198, 255, 0.05); }
        .card h3 { font-size: 1.1rem; margin-bottom: 10px; }
        .card p { color: #00c6ff; font-weight: bold; }

    </style>
</head>
<body>

    <button class="logout-btn" onclick="logout()">Logout</button>

    <div class="wrapper">
        <div class="left">
            <div class="title">CinemaStream</div>

            <p class="select-label">Genres</p>
            <div onclick="toggleDropdown()" class="select-display" id="genreDisplay">Choose Genres</div>
            <div id="dropdown" class="dropdown"></div>
            <div id="chips" style="margin-top: 15px;"></div>

            <div class="dial-container">
                <p class="select-label">Min Rating</p>
                <div class="dial-wrapper">
                    <svg width="120" height="120" id="ratingSvg">
                        <circle cx="60" cy="60" r="50" class="bg"/>
                        <circle cx="60" cy="60" r="50" class="progress" id="progress"/>
                    </svg>
                    <div id="ratingValue" style="position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); font-size: 1.5rem; font-weight: 800;">8.0</div>
                </div>
                <button class="find-btn" onclick="getMovies()">Generate List</button>
            </div>
        </div>

        <div class="right">
            <h2 style="margin-bottom: 20px; color: #555;">Rating Analysis</h2>
            <div class="chart-container">
                <canvas id="movieChart"></canvas>
            </div>

            <h2 style="margin-bottom: 20px; color: #555;">Recommendations</h2>
            <div id="results" class="results">
                <p style="color: #333;">Please select preferences to begin...</p>
            </div>
        </div>
    </div>

<script>
    // 1. AUTH & LOGOUT
    const username = localStorage.getItem("currentUser");
    if (!username) window.location.href = "login.html";

    function logout() {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }

    // 2. GENRE SETUP
    const genres = ["Action", "Drama", "Comedy", "Thriller", "Romance", "Crime", "Sci-Fi"];
    let selectedGenres = [];
    const dropdown = document.getElementById("dropdown");

    genres.forEach(g => {
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = g;
        div.onclick = () => {
            if(!selectedGenres.includes(g)) selectedGenres.push(g);
            renderChips();
            dropdown.style.display = "none";
        };
        dropdown.appendChild(div);
    });

    function toggleDropdown() { 
        dropdown.style.display = dropdown.style.display === "block" ? "none" : "block"; 
    }

    function renderChips() {
        document.getElementById("chips").innerHTML = selectedGenres.map(g => `
            <span class="chip">${g}<span style="margin-left:8px; cursor:pointer;" onclick="event.stopPropagation(); removeGenre('${g}')">×</span></span>
        `).join("");
    }

    function removeGenre(g) { 
        selectedGenres = selectedGenres.filter(x => x !== g); 
        renderChips(); 
    }

    // 3. MIN RATING DIAL SYSTEM
    let rating = 8.0;
    const circle = document.getElementById("progress");
    const ratingText = document.getElementById("ratingValue");
    const circumference = 2 * Math.PI * 50;

    circle.style.strokeDasharray = circumference;

    function updateDial(val) {
        val = Math.max(0, Math.min(10, val));
        rating = val;
        const offset = circumference - (val / 10) * circumference;
        circle.style.strokeDashoffset = offset;
        ratingText.innerText = val.toFixed(1);
    }

    updateDial(rating);

    function handleDialMove(e) {
        const rect = document.getElementById("ratingSvg").getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const dx = e.clientX - centerX;
        const dy = e.clientY - centerY;
        let angle = Math.atan2(dy, dx) * (180 / Math.PI) + 90;
        if (angle < 0) angle += 360;
        const newVal = (angle / 360) * 10;
        updateDial(newVal);
    }

    document.getElementById("ratingSvg").addEventListener("mousedown", (e) => {
        handleDialMove(e);
        window.addEventListener("mousemove", handleDialMove);
        window.addEventListener("mouseup", () => {
            window.removeEventListener("mousemove", handleDialMove);
        }, { once: true });
    });

    // 4. CHART SETUP (UPDATED COLORS)
    let myChart = null;
    function renderGraph(movieData) {
        const ctx = document.getElementById('movieChart').getContext('2d');
        if (myChart) myChart.destroy();

        // NEW: Map colors based on rating (Higher = Brighter)
        const backgroundColors = movieData.map(m => 
            m.rating >= 8.5 ? 'rgba(255, 215, 0, 0.6)' :  // Gold for top tier
            m.rating >= 7.0 ? 'rgba(0, 198, 255, 0.5)' :  // Cyan for good
            'rgba(0, 114, 255, 0.4)'                      // Blue for others
        );

        const borderColors = movieData.map(m => 
            m.rating >= 8.5 ? '#FFD700' : 
            m.rating >= 7.0 ? '#00c6ff' : 
            '#0072ff'
        );

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: movieData.map(m => m.movie_name),
                datasets: [{
                    label: 'Movie Rating',
                    data: movieData.map(m => m.rating),
                    backgroundColor: backgroundColors,
                    borderColor: borderColors,
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { 
                        beginAtZero: true, 
                        max: 10, 
                        grid: { color: 'rgba(255,255,255,0.03)' },
                        ticks: { color: '#555' }
                    },
                    x: { 
                        grid: { display: false },
                        ticks: { color: '#555' }
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // 5. API INTEGRATION
    async function getMovies() {
        if(selectedGenres.length === 0) return alert("Please select at least one genre!");
        
        const resultsContainer = document.getElementById("results");
        resultsContainer.innerHTML = "<p style='color: #00c6ff;'>Curating your movie list...</p>";
        
        try {
            const res = await fetch("http://127.0.0.1:8000/recommend", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    username: username, 
                    genre: selectedGenres.join(","), 
                    rating: parseFloat(rating.toFixed(1)) 
                })
            });
            
            const data = await res.json();
            
            if(data.recommendations && data.recommendations.length > 0) {
                resultsContainer.innerHTML = data.recommendations.map(m => `
                    <div class="card">
                        <h3>${m.movie_name}</h3>
                        <p>⭐ ${m.rating}</p>
                    </div>
                `).join("");
                
                renderGraph(data.recommendations);
            } else {
                resultsContainer.innerHTML = "<p style='color: #ff4d4d;'>No matches found. Try lowering the rating dial!</p>";
            }
        } catch (e) {
            resultsContainer.innerHTML = "<p style='color: #ff4d4d;'>API Connection Error. Is your server running?</p>";
        }
    }
</script>
</body>
</html>
